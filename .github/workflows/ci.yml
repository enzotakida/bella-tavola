name: CI — Bella Tavola

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: qualidade
  # Roda em todo push e PR — feedback rápido.
  # Verifica formatação, imports e testes smoke.
  # Não depende de secrets nem de recursos externos.
  # ─────────────────────────────────────────────
  qualidade:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico do ambiente
        run: |
          echo "=== Python ==="
          python --version
          echo "=== Arquivos do projeto ==="
          test -f main.py          && echo "✔ main.py"          || echo "✘ main.py ausente"
          test -f requirements.txt && echo "✔ requirements.txt" || echo "✘ requirements.txt ausente"
          test -d tests/           && echo "✔ tests/"           || echo "✘ tests/ ausente"
          test -f model_utils.py   && echo "✔ model_utils.py"   || echo "✘ model_utils.py ausente"

      - name: Verificar formatação
        run: black --check .

      - name: Verificar imports não utilizados
        run: autoflake --check --remove-all-unused-imports -r .

      - name: Rodar testes smoke
        run: python -m pytest tests/ -m smoke -v --tb=short

  # ─────────────────────────────────────────────
  # JOB 2: integracao
  # Roda apenas em push para main, depois de qualidade passar.
  # Secrets não estão disponíveis em PRs de forks externos —
  # por isso este job é restrito a pushes diretos.
  # ─────────────────────────────────────────────
  integracao:
    runs-on: ubuntu-latest
    needs: qualidade
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache do modelo Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-v1-${{ hashFiles('requirements.txt') }}

      - name: Diagnóstico do ambiente
        run: |
          echo "=== Python ==="
          python --version
          echo "=== Dependências instaladas ==="
          pip list
          echo "=== Arquivos do projeto ==="
          test -f main.py          && echo "✔ main.py"          || echo "✘ main.py ausente"
          test -f requirements.txt && echo "✔ requirements.txt" || echo "✘ requirements.txt ausente"
          test -d tests/           && echo "✔ tests/"           || echo "✘ tests/ ausente"
          test -f model_utils.py   && echo "✔ model_utils.py"   || echo "✘ model_utils.py ausente"
          echo "=== Autenticação ==="
          if [ -n "$HF_TOKEN" ]; then
            echo "✔ HF_TOKEN definido"
          else
            echo "✘ HF_TOKEN não definido"
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Verificar autenticação com Hugging Face
        run: python -c "import os; assert os.environ.get('HF_TOKEN'), 'HF_TOKEN não configurado'"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Rodar testes de integração
        run: python -m pytest tests/ -m integracao -v --tb=short
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  # JOB docker
  # Roda apenas em push para o main — após os testes de integração.
  # Se os testes falharam, a imagem não é publicada.
  # Usa o hash do commit como tag para rastreabilidade.
  # ─────────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: integracao
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      # Configura o BuildKit — o builder moderno do Docker
      # Necessário para o cache de layers funcionar no CI
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Autentica no Docker Hub usando os secrets do repositório
      # Nunca coloque usuário e senha diretamente no YAML
      - name: Autenticar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build e push da imagem
      # context: . → usa o Dockerfile na raiz do repositório
      # push: true → envia para o registry após o build
      # tags: duas tags — hash do commit (rastreabilidade) e latest (conveniência)
      # cache-from/to → evita rebuildar layers que não mudaram
      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bella-tavola:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/bella-tavola:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: relatorio
  # Roda após integração passar — resume o pipeline.
  # Ponto de extensão para deploy ou notificações futuras.
  # ─────────────────────────────────────────────
  relatorio:
    runs-on: ubuntu-latest
    needs: integracao
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Resumo do pipeline
        run: |
          echo "================================================"
          echo "  Pipeline CI do Bella Tavola concluído ✔"
          echo "================================================"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Autor:   ${{ github.actor }}"
          echo "================================================"
          echo "  Qualidade ✔ | Integração ✔ | Relatório ✔"
          echo "================================================"
